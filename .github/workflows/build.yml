name: Build and Package Mod

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] 
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Extracts "version" from ParticlesPlus/modinfo.json
      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' ParticlesPlus/modinfo.json)
          echo "MOD_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected Version: $VERSION"

      - name: Verify Dependencies
        run: |
          if [ ! -f "lib/VintagestoryAPI.dll" ]; then
            echo "::error::VintagestoryAPI.dll not found in /lib folder."
            exit 1
          fi

      - name: Restore Dependencies
        run: dotnet restore

      - name: Run ZZCakeBuild
        run: |
          dotnet run --project ZZCakeBuild/CakeBuild.csproj -- --target=Default --configuration=Release
        env:
          DOTNET_NOLOGO: true
          VINTAGE_STORY: ${{ github.workspace }}/lib 

      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: particlesplus_${{ env.MOD_VERSION }}.zip
          # Uses the dynamic version in the artifact name
          path: Releases/particlesplus_${{ env.MOD_VERSION }}.zip
          retention-days: 7
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: Releases/particlesplus_${{ env.MOD_VERSION }}.zip
          generate_release_notes: true
          # If it's a tag push, it uses the tag. 
          # If it's a manual trigger, it uses the version from the JSON.
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', env.MOD_VERSION) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}