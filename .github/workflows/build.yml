name: Build and Package Mod

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] # Triggers release logic when a tag is pushed
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create/upload to a GitHub Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify Dependencies
        run: |
          if [ ! -f "lib/VintagestoryAPI.dll" ]; then
            echo "::error::VintagestoryAPI.dll not found in /lib folder. Build will fail."
            exit 1
          fi

      - name: Restore Dependencies
        run: dotnet restore

      - name: Run ZZCakeBuild
        run: |
          dotnet run --project ZZCakeBuild/CakeBuild.csproj -- --target=Default --configuration=Release
        env:
          DOTNET_NOLOGO: true
          VINTAGE_STORY: ${{ github.workspace }}/lib 

      # Always upload the artifact so you can test builds without making a formal release
      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParticlesPlus-Build
          path: Releases/*.zip
          retention-days: 7

      # 2. Add to GitHub Releases (Only runs when you push a tag like v1.0.2)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Releases/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
