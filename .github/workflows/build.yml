name: Build and Package Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Vintage Story mods need the API DLLs to compile.
      # This step assumes you have put the DLLs in a /lib folder in your repo.
      - name: Verify Dependencies
        run: |
          if [ ! -f "lib/VintagestoryAPI.dll" ]; then
            echo "::error::VintagestoryAPI.dll not found in /lib folder. Build will fail."
            exit 1
          fi

      - name: Restore Dependencies
        run: dotnet restore

      # We run the Cake project using the correct argument separator '--'
      - name: Run ZZCakeBuild
        run: |
          dotnet run --project ZZCakeBuild/CakeBuild.csproj -- --target=Default --configuration=Release
        env:
          DOTNET_NOLOGO: true
          # Some Cake scripts look for this env var to find the game path
          VINTAGE_STORY: ${{ github.workspace }}/lib 

      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParticlesPlus-Build
          # Matches the folder your Cake script creates
          path: Releases/*.zip
          retention-days: 7